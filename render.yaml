services:
  - type: web
    name: unimak-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: unimak-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://unimak-frontend.onrender.com,http://localhost:5173

  - type: web
    name: unimak-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://unimak-backend.onrender.com

databases:
  - name: unimak-postgres
    plan: starter
