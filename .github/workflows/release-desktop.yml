name: release-desktop

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  package-web-desktop-base:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Build web bundle
        run: npm run build
      - name: Package desktop base bundle
        run: |
          mkdir -p ../desktop_release
          cp -r dist ../desktop_release/dist
      - name: Upload desktop base artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-base-dist
          path: desktop_release/dist
