name: release-desktop

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  release-desktop:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        run: npm install
        working-directory: frontend
      - name: Configure updater pubkey and artifacts for release
        working-directory: frontend
        env:
          TAURI_UPDATER_PUBLIC_KEY_BODY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_PRIVATE_KEY_BODY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD_BODY: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));const pub=(process.env.TAURI_UPDATER_PUBLIC_KEY_BODY||'').trim();const prv=(process.env.TAURI_PRIVATE_KEY_BODY||'').trim();const pwd=(process.env.TAURI_KEY_PASSWORD_BODY||'').trim();const pubValid=pub.includes('untrusted comment:')&&pub.split(/\r?\n/).length>=2;const prvValid=prv.includes('untrusted comment:')&&prv.split(/\r?\n/).length>=2&&prv.includes('minisign secret key');const enable=pubValid&&prvValid;if(enable){j.plugins.updater.pubkey=pub;j.bundle.createUpdaterArtifacts=true;console.log('Updater artifacts enabled.');}else{j.plugins.updater.pubkey='';j.bundle.createUpdaterArtifacts=false;console.log('Updater artifacts disabled (invalid key format). Building installer only.');}fs.writeFileSync(p,JSON.stringify(j,null,2));const ge=process.env.GITHUB_ENV;if(enable&&ge){const lines=['TAURI_SIGNING_PRIVATE_KEY<<EOF',prv,'EOF'];if(pwd){lines.push('TAURI_SIGNING_PRIVATE_KEY_PASSWORD='+pwd);}fs.appendFileSync(ge,lines.join('\\n')+'\\n');}"
      - name: Build and publish Tauri release assets
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Unimak Desktop ${{ github.ref_name }}"
          releaseBody: "Unimak desktop installer release."
          releaseDraft: false
          prerelease: false
          projectPath: frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
